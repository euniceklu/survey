<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bliss Naturals Product Survey</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <main class="container">
        <header>
            <h1>Bliss Naturals Customer Survey</h1>
            <p>Share your review and suggestions for our products.</p>
        </header>

        <section class="survey-card">
            <h2>Give Feedback</h2>
            <form id="surveyForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" placeholder="Your name" required />
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" required />
                </div>

                <div class="form-group">
                    <label for="product">Product</label>
                    <select id="product" name="product" required>
                        <option value="">Select a product</option>
                        <option value="Shampoo">Shampoo</option>
                        <option value="Conditioner">Conditioner</option>
                        <option value="Leave In Conditioner">Leave In Conditioner</option>
                        <option value="Hair Cream">Hair Cream</option>
                        <option value="Hair Growth Oil">Hair Growth Oil</option>
                        <option value="Tea Bag">Tea Bag</option>
                    </select>
                </div>

                <div class="form-group inline-group">
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating" required>
                        <option value="">Rate</option>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Very Good</option>
                        <option value="3">3 - Good</option>
                        <option value="2">2 - Fair</option>
                        <option value="1">1 - Needs Improvement</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="review">Review</label>
                    <textarea id="review" name="review" rows="4" placeholder="Tell us what you liked or what can improve" required></textarea>
                </div>

                <div class="form-group">
                    <label for="suggestion">Suggestion</label>
                    <textarea id="suggestion" name="suggestion" rows="4" placeholder="How do you want Bliss Naturals to move forward?" required></textarea>
                </div>

                <button type="submit" class="btn">Send Feedback</button>
                <p id="formMessage" class="message"></p>
            </form>
        </section>

        <section class="feedback-card">
            <h2>Recent Feedback</h2>
            <div id="feedbackList">Loading feedback...</div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
